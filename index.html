<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NeuralDesk</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d10;color:#e8e8f0;font-family:Inter,system-ui,sans-serif;font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
button{cursor:pointer;font-family:inherit}
textarea,input{font-family:inherit;outline:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#2a2a35;border-radius:4px}

/* TOPBAR */
#topbar{display:flex;align-items:center;gap:10px;padding:0 16px;height:50px;background:#16161a;border-bottom:1px solid #2a2a35;flex-shrink:0;flex-wrap:wrap}
#logo-dot{width:8px;height:8px;border-radius:50%;background:#7c6af7;box-shadow:0 0 8px #7c6af7;flex-shrink:0}
#logo-text{font-weight:600;font-size:15px}
#logo-sub{font-size:11px;color:#5a5a70}
#key-area{margin-left:auto;display:flex;align-items:center;gap:6px}
#key-input{background:#1e1e24;border:1px solid #2a2a35;color:#e8e8f0;padding:5px 10px;border-radius:6px;font-size:12px;width:190px}
#key-save{background:#7c6af7;border:none;color:#fff;padding:5px 12px;border-radius:6px;font-size:12px}
#key-status{display:flex;align-items:center;gap:6px;font-size:12px;color:#4ade80}
#key-status-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0}
#key-change{background:none;border:1px solid #2a2a35;color:#5a5a70;padding:3px 8px;border-radius:5px;font-size:11px}

/* LAYOUT */
#main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:220px;background:#16161a;border-right:1px solid #2a2a35;display:flex;flex-direction:column;padding:14px;gap:10px;flex-shrink:0}
#sidebar-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#5a5a70}
#dropzone{border:1px dashed #2a2a35;border-radius:8px;padding:20px 10px;text-align:center;color:#5a5a70;font-size:12px;position:relative;transition:border-color .2s,background .2s}
#dropzone.drag{border-color:#7c6af7;background:rgba(124,106,247,0.08)}
#dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
#drop-icon{font-size:22px;margin-bottom:6px}
#drop-hint{font-size:10px;color:#5a5a70;margin-top:4px}
#doc-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px}
.doc-item{background:#1e1e24;border:1px solid #2a2a35;border-radius:6px;padding:7px 9px;display:flex;align-items:center;gap:6px}
.doc-name{flex:1;font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-meta{font-size:10px;color:#5a5a70}
.doc-remove{background:none;border:none;color:#5a5a70;font-size:13px;padding:0 2px}
#no-docs{font-size:11px;color:#5a5a70;text-align:center;padding:10px 0}

/* CHAT */
#chat-area{display:flex;flex-direction:column;flex:1;overflow:hidden}
#mode-bar{display:flex;gap:4px;padding:6px 14px;border-bottom:1px solid #2a2a35;background:#16161a;align-items:center}
.mode-btn{padding:4px 12px;border-radius:5px;border:none;background:transparent;color:#9898b0;font-size:12px}
.mode-btn.active{background:rgba(124,106,247,0.15);border:1px solid #3d3578;color:#7c6af7}
#chunk-info{margin-left:auto;font-size:11px;color:#5a5a70}
#messages{flex:1;overflow-y:auto;padding:18px 18px;display:flex;flex-direction:column;gap:12px}
#empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#5a5a70;text-align:center;padding:40px 20px}
#empty-icon{font-size:40px;opacity:0.3}
#empty-title{font-size:15px;font-weight:500;color:#9898b0}
#empty-sub{font-size:12px;max-width:260px;line-height:1.5}

.msg-row{display:flex;gap:8px;max-width:100%}
.msg-row.user{flex-direction:row-reverse;align-self:flex-end}
.msg-row.assistant{align-self:flex-start}
.msg-avatar{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.msg-avatar.user{background:#1e1e24;border:1px solid #2a2a35}
.msg-avatar.assistant{background:rgba(124,106,247,0.15);border:1px solid #3d3578}
.msg-body{display:flex;flex-direction:column;gap:4px;max-width:580px}
.msg-bubble{padding:9px 13px;border-radius:9px;font-size:13px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.msg-bubble.user{background:#3d3578;border:1px solid rgba(124,106,247,0.3);color:#e8e8f0}
.msg-bubble.assistant{background:#1e1e24;border:1px solid #2a2a35;color:#e8e8f0}
.msg-bubble.error{color:#f87171}
.msg-thinking{font-size:11px;color:#7c6af7;opacity:0.7;padding:4px 0}
.msg-sources{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.source-tag{background:rgba(124,106,247,0.1);border:1px solid #3d3578;color:#7c6af7;font-size:10px;padding:1px 7px;border-radius:4px}

#input-area{padding:10px 14px 14px;border-top:1px solid #2a2a35;background:#16161a}
#input-box{display:flex;gap:8px;background:#1e1e24;border:1px solid #2a2a35;border-radius:9px;padding:8px 10px}
#msg-input{flex:1;background:transparent;border:none;color:#e8e8f0;font-size:13px;resize:none;max-height:100px;line-height:1.5}
#send-btn{background:#7c6af7;border:none;border-radius:6px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;align-self:flex-end;flex-shrink:0;transition:opacity .2s}
#send-btn:disabled{opacity:0.4;cursor:not-allowed}

#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1e1e24;border:1px solid #2a2a35;color:#e8e8f0;padding:7px 16px;border-radius:7px;font-size:12px;z-index:999;display:none;white-space:nowrap}

@media(max-width:600px){
  #sidebar{width:0;padding:0;border:none;overflow:hidden}
  #key-input{width:130px}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div id="logo-dot"></div>
  <span id="logo-text">NeuralDesk</span>
  <span id="logo-sub">powered by Claude</span>
  <div id="key-area">
    <div id="key-unsaved">
      <input id="key-input" type="password" placeholder="Anthropic API key"/>
      <button id="key-save">Save</button>
    </div>
    <div id="key-saved" style="display:none">
      <div id="key-status"><div id="key-status-dot"></div>API key set<button id="key-change">change</button></div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-label">Documents</div>
    <div id="dropzone">
      <input type="file" id="file-input" accept=".txt,.md,.csv,.json,.html"/>
      <div id="drop-icon">📂</div>
      <div>Drop file or click</div>
      <div id="drop-hint">.txt .md .csv .json .html</div>
    </div>
    <div id="doc-list">
      <div id="no-docs">No documents yet</div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat-area">
    <div id="mode-bar">
      <button class="mode-btn active" data-mode="rag">⚡ RAG</button>
      <button class="mode-btn" data-mode="chat">💬 Chat</button>
      <span id="chunk-info" style="display:none"></span>
    </div>
    <div id="messages">
      <div id="empty-state">
        <div id="empty-icon">🧠</div>
        <div id="empty-title">Ask your documents</div>
        <div id="empty-sub">Upload a file on the left, then ask anything about it</div>
      </div>
    </div>
    <div id="input-area">
      <div id="input-box">
        <textarea id="msg-input" rows="1" placeholder="Ask something…"></textarea>
        <button id="send-btn" disabled>↑</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Vector Store (your original logic) ──────────────────────────────────────
function tokenize(text){
  return text.toLowerCase().replace(/[^a-z0-9\s]/g," ").split(/\s+/).filter(Boolean);
}
function buildTFVector(tokens){
  const tf={};
  for(const t of tokens) tf[t]=(tf[t]||0)+1;
  return tf;
}
function cosineSim(a,b){
  const keys=new Set([...Object.keys(a),...Object.keys(b)]);
  let dot=0,magA=0,magB=0;
  for(const k of keys){
    const va=a[k]||0,vb=b[k]||0;
    dot+=va*vb;magA+=va*va;magB+=vb*vb;
  }
  if(!magA||!magB)return 0;
  return dot/(Math.sqrt(magA)*Math.sqrt(magB));
}
function chunkText(text,chunkSize=200,overlap=40){
  const words=text.split(/\s+/);
  const chunks=[];
  for(let i=0;i<words.length;i+=chunkSize-overlap){
    const chunk=words.slice(i,i+chunkSize).join(" ");
    if(chunk.trim())chunks.push(chunk);
    if(i+chunkSize>=words.length)break;
  }
  return chunks;
}
class VectorStore{
  constructor(){this.docs=[];}
  add(text,meta={}){
    const chunks=chunkText(text);
    chunks.forEach((chunk,i)=>{
      this.docs.push({chunk,vec:buildTFVector(tokenize(chunk)),meta:{...meta,chunkIndex:i}});
    });
    return chunks.length;
  }
  query(q,topK=3){
    const qvec=buildTFVector(tokenize(q));
    return this.docs
      .map(d=>({...d,score:cosineSim(qvec,d.vec)}))
      .sort((a,b)=>b.score-a.score)
      .slice(0,topK)
      .filter(d=>d.score>0);
  }
  clear(){this.docs=[];}
  get count(){return this.docs.length;}
}

// ── State ────────────────────────────────────────────────────────────────────
const store=new VectorStore();
let mode="rag";
let docs=[];
let loading=false;
let apiKey="";

// ── DOM refs ─────────────────────────────────────────────────────────────────
const keyInput=document.getElementById("key-input");
const keySave=document.getElementById("key-save");
const keyUnsaved=document.getElementById("key-unsaved");
const keySaved=document.getElementById("key-saved");
const keyChange=document.getElementById("key-change");
const dropzone=document.getElementById("dropzone");
const fileInput=document.getElementById("file-input");
const docList=document.getElementById("doc-list");
const noDocs=document.getElementById("no-docs");
const modeBar=document.getElementById("mode-bar");
const chunkInfo=document.getElementById("chunk-info");
const messagesEl=document.getElementById("messages");
const emptyState=document.getElementById("empty-state");
const emptyIcon=document.getElementById("empty-icon");
const emptyTitle=document.getElementById("empty-title");
const emptySub=document.getElementById("empty-sub");
const msgInput=document.getElementById("msg-input");
const sendBtn=document.getElementById("send-btn");
const toastEl=document.getElementById("toast");

// ── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg){
  toastEl.textContent=msg;
  toastEl.style.display="block";
  setTimeout(()=>toastEl.style.display="none",2500);
}

// ── API Key ──────────────────────────────────────────────────────────────────
const saved=localStorage.getItem("nd_key");
if(saved){apiKey=saved;showKeySaved();}

function showKeySaved(){
  keyUnsaved.style.display="none";
  keySaved.style.display="flex";
  updateSendBtn();
}
function showKeyUnsaved(){
  keyUnsaved.style.display="flex";
  keySaved.style.display="none";
  updateSendBtn();
}
keySave.onclick=()=>{
  const v=keyInput.value.trim();
  if(!v)return;
  apiKey=v;
  localStorage.setItem("nd_key",v);
  showKeySaved();
  showToast("API key saved");
};
keyInput.onkeydown=e=>{if(e.key==="Enter")keySave.click();};
keyChange.onclick=()=>{
  apiKey="";
  localStorage.removeItem("nd_key");
  keyInput.value="";
  showKeyUnsaved();
};

// ── Mode ─────────────────────────────────────────────────────────────────────
modeBar.querySelectorAll(".mode-btn").forEach(btn=>{
  btn.onclick=()=>{
    mode=btn.dataset.mode;
    modeBar.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    updateEmptyState();
  };
});

function updateEmptyState(){
  if(mode==="rag"){
    emptyIcon.textContent="🧠";
    emptyTitle.textContent="Ask your documents";
    emptySub.textContent="Upload a file on the left, then ask anything about it";
  } else {
    emptyIcon.textContent="💬";
    emptyTitle.textContent="Chat with Claude";
    emptySub.textContent="General conversation — no document needed";
  }
}

// ── File / Drop ───────────────────────────────────────────────────────────────
dropzone.ondragover=e=>{e.preventDefault();dropzone.classList.add("drag");};
dropzone.ondragleave=()=>dropzone.classList.remove("drag");
dropzone.ondrop=e=>{
  e.preventDefault();dropzone.classList.remove("drag");
  const f=e.dataTransfer.files[0];
  if(f)ingestFile(f);
};
fileInput.onchange=e=>{
  const f=e.target.files[0];
  if(f)ingestFile(f);
  fileInput.value="";
};

async function ingestFile(file){
  const text=await file.text();
  if(!text.trim())return;
  const n=store.add(text,{name:file.name});
  docs.push({name:file.name,size:text.length,chunks:n});
  renderDocs();
  updateChunkInfo();
  showToast(`"${file.name}" indexed — ${n} chunks`);
}

function renderDocs(){
  docList.innerHTML="";
  if(docs.length===0){docList.appendChild(noDocs);return;}
  docs.forEach((d,i)=>{
    const el=document.createElement("div");
    el.className="doc-item";
    el.innerHTML=`
      <div style="flex:1;min-width:0">
        <div class="doc-name">${d.name}</div>
        <div class="doc-meta">${d.chunks} chunks · ${(d.size/1000).toFixed(1)}KB</div>
      </div>
      <button class="doc-remove" data-i="${i}">✕</button>`;
    docList.appendChild(el);
  });
  docList.querySelectorAll(".doc-remove").forEach(btn=>{
    btn.onclick=()=>{
      docs.splice(parseInt(btn.dataset.i),1);
      store.clear();
      renderDocs();
      updateChunkInfo();
      showToast("Document removed");
    };
  });
}

function updateChunkInfo(){
  if(store.count>0){
    chunkInfo.style.display="block";
    chunkInfo.textContent=`searching ${store.count} chunks`;
  } else {
    chunkInfo.style.display="none";
  }
}

// ── Messages ──────────────────────────────────────────────────────────────────
let messageHistory=[];

function addMessage(role,content,{sources=[],error=false,thinking=false}={}){
  const id="m"+Date.now()+Math.random();
  const row=document.createElement("div");
  row.className=`msg-row ${role}`;
  row.id=id;

  const avatarEl=document.createElement("div");
  avatarEl.className=`msg-avatar ${role}`;
  avatarEl.textContent=role==="assistant"?"🤖":"👤";

  const body=document.createElement("div");
  body.className="msg-body";

  if(thinking){
    const t=document.createElement("div");
    t.className="msg-thinking";
    t.textContent="⚙ Thinking…";
    body.appendChild(t);
  } else {
    const bubble=document.createElement("div");
    bubble.className=`msg-bubble ${role}${error?" error":""}`;
    bubble.textContent=content;
    body.appendChild(bubble);
    if(sources.length){
      const st=document.createElement("div");
      st.className="msg-sources";
      sources.forEach(s=>{
        const tag=document.createElement("span");
        tag.className="source-tag";
        tag.textContent=s;
        st.appendChild(tag);
      });
      body.appendChild(st);
    }
  }

  row.appendChild(avatarEl);
  row.appendChild(body);

  if(emptyState.parentNode===messagesEl) messagesEl.removeChild(emptyState);
  messagesEl.appendChild(row);
  messagesEl.scrollTop=messagesEl.scrollHeight;
  return id;
}

function updateMessage(id,content,{sources=[],error=false}={}){
  const row=document.getElementById(id);
  if(!row)return;
  const body=row.querySelector(".msg-body");
  body.innerHTML="";
  const bubble=document.createElement("div");
  bubble.className=`msg-bubble assistant${error?" error":""}`;
  bubble.textContent=content;
  body.appendChild(bubble);
  if(sources.length){
    const st=document.createElement("div");
    st.className="msg-sources";
    sources.forEach(s=>{
      const tag=document.createElement("span");
      tag.className="source-tag";
      tag.textContent=s;
      st.appendChild(tag);
    });
    body.appendChild(st);
  }
  messagesEl.scrollTop=messagesEl.scrollHeight;
}

// ── Send ──────────────────────────────────────────────────────────────────────
function updateSendBtn(){
  sendBtn.disabled=loading||!msgInput.value.trim()||!apiKey;
}

msgInput.oninput=()=>{
  msgInput.style.height="auto";
  msgInput.style.height=Math.min(msgInput.scrollHeight,100)+"px";
  updateSendBtn();
};
msgInput.onkeydown=e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();doSend();}
};
sendBtn.onclick=doSend;

async function doSend(){
  const q=msgInput.value.trim();
  if(!q||loading||!apiKey)return;

  if(!apiKey){showToast("Enter your Anthropic API key first");return;}

  msgInput.value="";
  msgInput.style.height="auto";
  loading=true;
  updateSendBtn();

  // Add user message
  addMessage("user",q);
  messageHistory.push({role:"user",content:q});

  // Build system prompt
  let systemPrompt="You are a helpful assistant. Be concise and clear.";
  let sources=[];

  if(mode==="rag"&&store.count>0){
    const hits=store.query(q,3);
    if(hits.length){
      const context=hits.map((h,i)=>`[${i+1}] ${h.chunk}`).join("\n\n");
      sources=[...new Set(hits.map(h=>h.meta.name).filter(Boolean))];
      systemPrompt=`You are a helpful assistant. Answer strictly using the context below. If the answer isn't in the context, say so.\n\nCONTEXT:\n${context}`;
    }
  }

  // Show thinking
  const thinkId=addMessage("assistant","",{thinking:true});

  try {
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1000,
        system:systemPrompt,
        messages:messageHistory,
      })
    });

    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(err.error?.message||`API error ${res.status}`);
    }

    const data=await res.json();
    const reply=data.content?.[0]?.text||"(no response)";
    messageHistory.push({role:"assistant",content:reply});
    updateMessage(thinkId,reply,{sources});

  } catch(e){
    updateMessage(thinkId,`Error: ${e.message}`,{error:true});
  }

  loading=false;
  updateSendBtn();
}
</script>
</body>
 </html>
